<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Sud Diagnostic Pro</title>

<style>
body{font-family:Arial;background:#111;color:#fff;padding:15px}
input,select{width:100%;padding:12px;margin:6px 0;font-size:16px}
button{width:100%;padding:15px;background:#ff6600;color:white;border:none;font-size:18px}
.card{background:#1c1c1c;padding:15px;margin-bottom:10px;border-radius:10px}
.result{white-space:pre-wrap}
</style>
</head>

<body>

<h2>Air Sud Diagnostic Pro</h2>

<div class="card">
<input id="bp" placeholder="BP (bar)">
<input id="hp" placeholder="HP (bar)">
<input id="dt" placeholder="Delta T (°C)">
<input id="amp" placeholder="Intensité (A)">
<select id="ventilo">
<option value="">Ventilateur</option>
<option value="ok">OK</option>
<option value="hs">HS</option>
</select>

<button onclick="diag()">Analyser</button>
</div>

<div class="card result" id="result">
Résultat...
</div>

<script>

function val(id){
return parseFloat(document.getElementById(id).value)||0
}

function diag(){

let bp=val("bp");
let hp=val("hp");
let dt=val("dt");
let amp=val("amp");
let ventilo=document.getElementById("ventilo").value;

let txt="";
let certitude=0;

// ===== MANQUE DE FLUIDE =====
if(bp<3 && hp<10){

txt+="🔴 DIAGNOSTIC : MANQUE DE FLUIDE PROBABLE\n";
certitude+=3;

if(dt<5){
txt+="👉 Confirmation : mauvais rendement\n";
certitude+=2;
}

txt+="\nCAUSE PROBABLE :\n";
txt+="- Fuite sur circuit frigorifique\n";

txt+="\nPROCÉDURE PRO :\n";
txt+="1. Contrôle visuel (huile / traces)\n";
txt+="2. Recherche de fuite (savon / détecteur)\n";
txt+="3. Mise sous azote (30 bar)\n";
txt+="4. Réparation (brasure)\n";
txt+="5. Épreuve d’étanchéité (maintien pression)\n";
txt+="6. Tirage au vide\n";
txt+="7. Recharge\n";

txt+="\n⚠️ Recharge interdite sans recherche de fuite et test d’étanchéité\n";
}

// ===== COMPRESSEUR =====
else if(bp>6 && hp<12){

txt+="⚠️ DIAGNOSTIC : COMPRESSEUR FATIGUÉ\n";
certitude+=3;

if(amp>8){
txt+="👉 Intensité élevée = effort anormal\n";
certitude+=2;
}

txt+="\nCAUSE PROBABLE :\n";
txt+="- Perte de compression interne\n";

txt+="\nPROCÉDURE PRO :\n";
txt+="1. Vérifier alimentation électrique\n";
txt+="2. Contrôler intensité en fonctionnement\n";
txt+="3. Vérifier démarrage compresseur\n";
txt+="4. Contrôle en charge\n";
txt+="5. Conclusion client (pièce dégradée)\n";

txt+="\n💬 IMPORTANT : panne souvent antérieure à l’intervention\n";
}

// ===== CONDENSEUR =====
if(hp>20){

txt+="\n🔥 DIAGNOSTIC : CONDENSEUR ENCRASSÉ\n";
certitude+=2;

txt+="\nPROCÉDURE :\n";
txt+="1. Nettoyage échangeur extérieur\n";
txt+="2. Vérifier ventilation\n";
}

// ===== RENDEMENT =====
if(dt<5){
txt+="\n❌ MAUVAIS RENDEMENT\n";
}

// ===== ÉLECTRIQUE =====
if(amp>8){
txt+="\n⚡ SURCONSOMMATION ÉLECTRIQUE\n";
}

if(ventilo==="hs"){
txt+="\n⚡ VENTILATEUR HS\n";
txt+="PROCÉDURE :\n";
txt+="1. Vérifier alimentation\n";
txt+="2. Vérifier condensateur\n";
txt+="3. Remplacement\n";
}

// ===== CERTITUDE =====
txt+="\n\n🎯 NIVEAU DE CERTITUDE : ";

if(certitude>=5){
txt+="ÉLEVÉ";
}else if(certitude>=3){
txt+="MOYEN";
}else{
txt+="FAIBLE";
}

document.getElementById("result").innerText=txt;
}

</script>

</body>
</html>
