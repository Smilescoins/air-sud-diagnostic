<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Sud Diagnostic Expert V5</title>

<style>
body{font-family:Arial;background:#111;color:#fff;padding:15px}
input,select{width:100%;padding:12px;margin:6px 0;font-size:16px}
button{width:100%;padding:15px;background:#ff6600;color:white;border:none;font-size:18px}
.card{background:#1c1c1c;padding:15px;margin-bottom:10px;border-radius:10px}
.result{white-space:pre-wrap}
</style>
</head>

<body>

<h2>Air Sud Diagnostic Expert V5</h2>

<div class="card">
<input id="bp" placeholder="BP (bar)">
<input id="hp" placeholder="HP (bar)">
<input id="dt" placeholder="Delta T (°C)">
<input id="amp" placeholder="Intensité (A)">
<input id="tempExt" placeholder="Température extérieure (°C)">

<input id="sh" placeholder="Surchauffe (°C)">
<input id="sr" placeholder="Sous-refroidissement (°C)">

<select id="ventiloExt">
<option value="">Ventilateur condenseur</option>
<option value="ok">OK</option>
<option value="hs">HS</option>
</select>

<select id="ventiloInt">
<option value="">Ventilateur évaporateur</option>
<option value="ok">OK</option>
<option value="hs">HS</option>
</select>

<select id="givre">
<option value="">Givre</option>
<option value="aucun">Aucun</option>
<option value="leger">Léger</option>
<option value="important">Important</option>
</select>

<select id="tuyauAsp">
<option value="">Tuyau aspiration</option>
<option value="froide">Froide</option>
<option value="tiede">Tiède</option>
<option value="chaude">Chaude</option>
</select>

<select id="tuyauLiquide">
<option value="">Tuyau liquide</option>
<option value="chaud">Chaud</option>
<option value="normal">Normal</option>
<option value="froid">Froid</option>
</select>

<button onclick="diag()">Analyser</button>
</div>

<div class="card result" id="result">Résultat...</div>

<script>

function val(id){
  return parseFloat(document.getElementById(id).value) || 0;
}

function diag(){

let bp = val("bp");
let hp = val("hp");
let dt = val("dt");
let amp = val("amp");
let tempExt = val("tempExt");
let sh = val("sh");
let sr = val("sr");

let ventiloExt = document.getElementById("ventiloExt").value;
let ventiloInt = document.getElementById("ventiloInt").value;
let givre = document.getElementById("givre").value;
let tuyauAsp = document.getElementById("tuyauAsp").value;
let tuyauLiquide = document.getElementById("tuyauLiquide").value;

let txt="";
let certitude=0;
let incoherent=false;

// ===== INCOHERENCE =====
if(bp<3 && hp>20){incoherent=true;}
if(ventiloExt==="hs" && hp>20){incoherent=true;}
if(tuyauAsp==="chaude" && bp<3){incoherent=true;}

// ===== SURCHAUFFE ANALYSE =====
if(sh>15){
txt+="🔥 SURCHAUFFE ÉLEVÉE\n";
txt+="👉 Manque de fluide probable\n";
certitude+=2;
}

if(sh<3 && sh>0){
txt+="❄️ SURCHAUFFE FAIBLE\n";
txt+="👉 Détendeur / suralimentation possible\n";
certitude+=2;
}

// ===== SOUS-REFROIDISSEMENT =====
if(sr>15){
txt+="💧 SOUS-REFROIDISSEMENT ÉLEVÉ\n";
txt+="👉 Surcharge ou condenseur\n";
certitude+=2;
}

if(sr<3 && sr>0){
txt+="💧 SOUS-REFROIDISSEMENT FAIBLE\n";
txt+="👉 Manque de fluide possible\n";
certitude+=2;
}

// ===== MANQUE FLUIDE =====
if(!incoherent && bp<3 && hp<10){

txt+="\n🔴 MANQUE DE FLUIDE IMPORTANT\n";
certitude+=3;

if(sh>10){
txt+="👉 Confirmation par surchauffe\n";
certitude+=2;
}
}

// ===== MANQUE FLUIDE LEGER =====
else if(!incoherent && bp<3 && hp<=20){

txt+="\n🟠 MANQUE DE FLUIDE POSSIBLE\n";
certitude+=2;
}

// ===== COMPRESSEUR =====
else if(!incoherent && bp>6 && hp<12){

txt+="\n⚠️ COMPRESSEUR FATIGUÉ\n";
certitude+=3;
}

// ===== DETENDEUR =====
if(sh<3 && givre==="important"){
txt+="\n❄️ DÉTENDEUR POSSIBLEMENT DÉFAILLANT\n";
certitude+=3;
}

// ===== CONDENSEUR =====
if(hp>20){
txt+="\n🔥 CONDENSEUR / SURCHAUFFE\n";
}

// ===== VENTILATEURS =====
if(ventiloExt==="hs"){
txt+="\n⚡ VENTILATEUR CONDENSEUR HS\n";
certitude+=2;
}

if(ventiloInt==="hs"){
txt+="\n❄️ VENTILATEUR ÉVAPORATEUR HS\n";
certitude+=2;
}

// ===== INCOHERENCE =====
if(incoherent){
txt="⚠️ DIAGNOSTIC INCERTAIN\n\n";
txt+="👉 Réparer panne évidente\n";
txt+="👉 Refaire mesures\n";
txt+="👉 Relancer diagnostic\n";
certitude=1;
}

// ===== SI RIEN =====
if(txt===""){
txt="ℹ️ Aucune panne nette détectée\n";
}

// ===== CERTITUDE =====
txt+="\n\n🎯 CERTITUDE : ";
if(certitude>=6){txt+="ÉLEVÉ";}
else if(certitude>=3){txt+="MOYEN";}
else{txt+="FAIBLE";}

document.getElementById("result").innerText=txt;
}

</script>

</body>
</html>
