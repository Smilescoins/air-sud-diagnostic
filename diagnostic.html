<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Sud Diagnostic Expert</title>

<style>
body{font-family:Arial;background:#111;color:#fff;padding:15px}
input,select{width:100%;padding:12px;margin:6px 0;font-size:16px}
button{width:100%;padding:15px;background:#ff6600;color:white;border:none;font-size:18px}
.card{background:#1c1c1c;padding:15px;margin-bottom:10px;border-radius:10px}
.result{white-space:pre-wrap}
</style>
</head>

<body>

<h2>Air Sud Diagnostic Expert</h2>

<div class="card">
<input id="bp" placeholder="BP (bar)">
<input id="hp" placeholder="HP (bar)">
<input id="dt" placeholder="Delta T (°C)">
<input id="amp" placeholder="Intensité (A)">
<select id="ventilo">
<option value="">Ventilateur</option>
<option value="ok">OK</option>
<option value="hs">HS</option>
</select>

<button onclick="diag()">Analyser</button>
</div>

<div class="card result" id="result">
Résultat...
</div>

<script>

function val(id){
return parseFloat(document.getElementById(id).value)||0
}

function diag(){

let bp=val("bp");
let hp=val("hp");
let dt=val("dt");
let amp=val("amp");
let ventilo=document.getElementById("ventilo").value;

let txt="";
let certitude=0;
let incoherent=false;

// ===== DETECTION INCOHERENCE =====

if(bp<3 && hp>20){
incoherent=true;
}

if(ventilo==="hs" && hp>20){
incoherent=true;
}

// ===== MANQUE DE FLUIDE =====
if(!incoherent && bp<3 && hp<10){

txt+="🔴 DIAGNOSTIC : MANQUE DE FLUIDE PROBABLE\n";
certitude+=3;

if(dt<5){
txt+="👉 Confirmation : mauvais rendement\n";
certitude+=2;
}

txt+="\nPROCÉDURE PRO :\n";
txt+="1. Contrôle visuel (huile / traces)\n";
txt+="2. Recherche de fuite\n";
txt+="3. Mise sous azote (30 bar)\n";
txt+="4. Réparation (brasure)\n";
txt+="5. Épreuve d’étanchéité\n";
txt+="6. Tirage au vide\n";
txt+="7. Recharge\n";

txt+="\n⚠️ Recharge interdite sans test d’étanchéité\n";
}

// ===== COMPRESSEUR =====
else if(!incoherent && bp>6 && hp<12){

txt+="⚠️ DIAGNOSTIC : COMPRESSEUR FATIGUÉ\n";
certitude+=3;

if(amp>8){
txt+="👉 Intensité élevée = effort anormal\n";
certitude+=2;
}

txt+="\nPROCÉDURE PRO :\n";
txt+="1. Vérifier alimentation\n";
txt+="2. Contrôle intensité\n";
txt+="3. Vérifier démarrage\n";
txt+="4. Test en charge\n";
txt+="5. Conclusion client\n";

}

// ===== CONDENSEUR =====
if(hp>20){

txt+="\n🔥 CONDENSEUR ENCRASSÉ / SURCHAUFFE\n";

}

// ===== ELECTRIQUE =====
if(amp>8){
txt+="\n⚡ SURCONSOMMATION\n";
}

if(ventilo==="hs"){
txt+="\n⚡ VENTILATEUR HS\n";
}

// ===== INCOHERENCE =====

if(incoherent){

txt="⚠️ DIAGNOSTIC INCERTAIN\n\n";

txt+="Plusieurs anomalies incohérentes détectées\n\n";

txt+="👉 PROCÉDURE IMMÉDIATE :\n";
txt+="1. Réparer la panne évidente (ventilateur / condenseur)\n";
txt+="2. Redémarrer la machine\n";
txt+="3. Reprendre les mesures BP / HP\n";
txt+="4. Relancer le diagnostic\n\n";

txt+="❌ INTERDICTION :\n";
txt+="- Ne pas recharger en fluide\n";
txt+="- Ne pas conclure trop tôt\n";

certitude=1;
}

// ===== CERTITUDE =====

txt+="\n\n🎯 NIVEAU DE CERTITUDE : ";

if(certitude>=5){
txt+="ÉLEVÉ";
}else if(certitude>=3){
txt+="MOYEN";
}else{
txt+="FAIBLE";
}

document.getElementById("result").innerText=txt;
}

</script>

</body>
</html>
