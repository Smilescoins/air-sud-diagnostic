<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Air Sud Éco-Confort</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:orange;color:white}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:10px}
</style>
</head>

<body>

<h1>Air Sud Éco-Confort</h1>

<!-- MENU -->
<button onclick="show('diag')">Diagnostic</button>
<button onclick="show('usa')">Mode USA</button>
<button onclick="show('doc')">Intervention</button>
<button onclick="show('hist')">Historique</button>

<!-- DIAGNOSTIC -->
<div id="diag" class="card">
<h2>Diagnostic</h2>
<input id="bp" placeholder="BP">
<input id="hp" placeholder="HP">
<input id="amp" placeholder="Intensité">
<input id="amb" placeholder="Temp ambiante">
<input id="souf" placeholder="Temp soufflage">
<button onclick="diagnostic()">Analyser</button>
<pre id="res"></pre>
</div>

<!-- MODE USA -->
<div id="usa" class="card" style="display:none">
<h2>Mode USA</h2>
<button onclick="usa()">Pas de démarrage</button>
<pre id="usaRes"></pre>
</div>

<!-- INTERVENTION -->
<div id="doc" class="card" style="display:none">
<h2>Intervention</h2>

<input id="client" placeholder="Nom client">

<br><br>

<label><input type="checkbox" value="110"> Entretien monosplit 110€</label><br>
<label><input type="checkbox" value="160"> Multisplit 160€</label><br>
<label><input type="checkbox" value="90"> Recherche fuite 90€</label><br>
<label><input type="checkbox" value="60"> Recharge MO 60€</label><br>

<br>

<button onclick="total()">Calcul total</button>
<pre id="total"></pre>

<button onclick="save()">Enregistrer</button>
</div>

<!-- HISTORIQUE -->
<div id="hist" class="card" style="display:none">
<h2>Historique</h2>
<div id="list"></div>
</div>

<script>

function show(id){
 document.getElementById("diag").style.display="none";
 document.getElementById("usa").style.display="none";
 document.getElementById("doc").style.display="none";
 document.getElementById("hist").style.display="none";
 document.getElementById(id).style.display="block";
}

// DIAGNOSTIC
function diagnostic(){
 let bp=+document.getElementById("bp").value;
 let hp=+document.getElementById("hp").value;
 let amb=+document.getElementById("amb").value;
 let souf=+document.getElementById("souf").value;

 let dt=amb-souf;

 let r="";
 if(bp<3 && hp<10) r="Manque de fluide";
 else if(bp<3) r="Restriction possible";
 else if(hp>20) r="Problème condensation";
 else r="RAS";

 document.getElementById("res").innerText="ΔT="+dt+"\n"+r;
}

// USA
function usa(){
 document.getElementById("usaRes").innerText=
 "Défaut électrique probable - vérifier disjoncteur, alimentation, fusible ou condensateur";
}

// TOTAL
function total(){
 let sum=0;
 document.querySelectorAll("#doc input[type=checkbox]").forEach(c=>{
   if(c.checked) sum+=+c.value;
 });
 document.getElementById("total").innerText=sum+" €";
}

// HISTO
let hist=[];

function save(){
 let name=document.getElementById("client").value;
 let t=document.getElementById("total").innerText;

 hist.push(name+" - "+t);
 render();
}

function render(){
 let html="";
 hist.forEach(h=>html+="<div>"+h+"</div>");
 document.getElementById("list").innerHTML=html;
}

</script>

</body>
</html>
