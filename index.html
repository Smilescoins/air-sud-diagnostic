<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Air Sud Éco-Confort</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family:Arial;background:#f5f5f5;padding:10px;}
.card {background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
input, textarea {width:100%;padding:8px;margin:5px 0;}
button {width:100%;padding:12px;background:orange;color:white;border:none;margin-top:5px;}
canvas {border:1px solid black;width:100%;height:100px;}
</style>
</head>

<body>

<h2>Air Sud Éco-Confort</h2>

<div class="card">
<input id="client" placeholder="Nom client">
<input id="adresse" placeholder="Adresse">
<input type="file" id="photo">
</div>

<div class="card">
<input id="bp" placeholder="BP">
<input id="hp" placeholder="HP">
<input id="amp" placeholder="Intensité">
<input id="amb" placeholder="Température ambiante">
<input id="souf" placeholder="Température soufflage">

<button onclick="diagnostic()">Diagnostic</button>
<pre id="result"></pre>
</div>

<div class="card">
<label><input type="checkbox" class="p" value="110"> Entretien</label><br>
<label><input type="checkbox" class="p" value="90"> Fuite</label><br>
<label><input type="checkbox" class="p" value="150"> Électrique</label><br>

<input id="fluide" placeholder="Fluide €">
<button onclick="calc()">Total</button>
Total : <span id="total">0</span> €
</div>

<div class="card">
<canvas id="sign"></canvas>
<button onclick="clearSign()">Effacer</button>
</div>

<div class="card">
<button onclick="generate()">Rapport</button>
<button onclick="pdf()">PDF</button>
<button onclick="wa()">WhatsApp</button>
<button onclick="save()">Historique</button>
<textarea id="rapport"></textarea>
</div>

<pre id="hist"></pre>

<script>

function diagnostic(){
let bp=parseFloat(bp.value);
let hp=parseFloat(hp.value);
let txt="";

if(bp<3 && hp<10){txt+="Manque fluide\n";document.querySelectorAll(".p")[1].checked=true;}
if(bp>6 && hp<12){txt+="Compresseur HS probable\n";}

result.innerText=txt;
}

function calc(){
let t=0;
document.querySelectorAll(".p").forEach(c=>{if(c.checked)t+=+c.value});
t+=+fluide.value||0;
total.innerText=t;
}

function generate(){
rapport.value=
"Client:"+client.value+"\n"+
"Adresse:"+adresse.value+"\n\n"+
"Diagnostic:\n"+result.innerText+
"\nTotal:"+total.innerText+"€";
}

function pdf(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text(rapport.value,10,10);
doc.save("rapport.pdf");
}

function wa(){
window.open("https://wa.me/?text="+encodeURIComponent(rapport.value));
}

function save(){
let d=rapport.value+"\n---\n";
let h=localStorage.getItem("h")||"";
localStorage.setItem("h",d+h);
hist.innerText=localStorage.getItem("h");
}

let c=document.getElementById("sign");
let ctx=c.getContext("2d");
let draw=false;

c.onmousedown=()=>draw=true;
c.onmouseup=()=>draw=false;
c.onmousemove=e=>{
if(!draw)return;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
};

function clearSign(){ctx.clearRect(0,0,c.width,c.height);}

hist.innerText=localStorage.getItem("h")||"";

</script>

</body>
</html>
