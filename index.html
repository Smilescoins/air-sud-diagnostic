<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Sud Éco-Confort</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 15px;
}

h2 { color: #3b82f6; }
.orange { color: orange; }

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

.btn-orange { background: orange; color: white; }
.btn-blue { background: #3b82f6; color: white; }
.btn-green { background: #22c55e; color: white; }

pre {
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h2>Air Sud Éco-Confort</h2>
<p class="orange">📞 07 71 13 65 48</p>
<p>Un partenaire de confiance avant tout</p>

<div class="card">
<h3>Diagnostic</h3>

<input id="bp" placeholder="BP (bar)">
<input id="hp" placeholder="HP (bar)">
<input id="amp" placeholder="Intensité">
<input id="amb" placeholder="Température ambiante">
<input id="souf" placeholder="Température soufflage">

<button class="btn-orange" onclick="diagnostic()">Lancer diagnostic</button>

<pre id="result"></pre>
</div>

<div class="card">
<h3>Fiche client</h3>

<input id="client" placeholder="Nom client">
<input id="adresse" placeholder="Adresse">

<textarea id="rapport" rows="10"></textarea>

<button class="btn-blue" onclick="generate()">📄 Générer rapport</button>
<button class="btn-green" onclick="printRapport()">🖨️ PDF / Impression</button>
<button class="btn-orange" onclick="sendWhatsApp()">📲 Envoyer WhatsApp</button>
</div>

<script>

function diagnostic(){

 let bp = parseFloat(document.getElementById("bp").value);
 let hp = parseFloat(document.getElementById("hp").value);
 let amp = parseFloat(document.getElementById("amp").value);
 let amb = parseFloat(document.getElementById("amb").value);
 let souff = parseFloat(document.getElementById("souf").value);

 let delta = amb - souff;
 let res = "";

 if(isNaN(bp) || isNaN(hp)){
   res="⚠️ Renseigne BP et HP minimum";
 }

 else{

   if(bp<3 && hp<10){
     res += "🔴 Manque de fluide probable\n👉 Vérifier fuite + test azote\n\n";
   }

   if(bp<3 && hp>=12){
     res += "❄️ Problème évaporateur / KVP\n\n";
   }

   if(bp>=4 && hp<10){
     res += "🔥 Problème condensation / KVR\n\n";
   }

   if(bp>6 && hp<12){
     res += "⚠️ Compresseur fatigué (déjà usé)\n\n";
   }

   if(hp>20){
     res += "🔥 Condenseur encrassé\n\n";
   }

   if(!isNaN(delta)){
     if(delta < 5){
       res += "🌡️ Mauvais rendement\n";
     }
     else if(delta >=8){
       res += "✅ Bon rendement\n";
     }
   }

   if(!isNaN(amp)){
     if(amp < 3){
       res += "⚡ Intensité faible\n";
     }
     else if(amp > 8){
       res += "⚡ Intensité élevée\n";
     }
   }

 }

 document.getElementById("result").innerText = res;
}

function generate(){

 let client = document.getElementById("client").value;
 let adresse = document.getElementById("adresse").value;
 let bp = document.getElementById("bp").value;
 let hp = document.getElementById("hp").value;
 let amp = document.getElementById("amp").value;
 let amb = document.getElementById("amb").value;
 let souff = document.getElementById("souf").value;
 let diag = document.getElementById("result").innerText;

 let date = new Date().toLocaleString();

 let txt = "";

 txt += "===== RAPPORT AIR SUD ÉCO-CONFORT =====\n\n";
 txt += "Date : " + date + "\n\n";
 txt += "Client : " + client + "\n";
 txt += "Adresse : " + adresse + "\n\n";

 txt += "BP : " + bp + " bar\n";
 txt += "HP : " + hp + " bar\n";
 txt += "Intensité : " + amp + " A\n";
 txt += "Température ambiante : " + amb + " °C\n";
 txt += "Température soufflage : " + souff + " °C\n\n";

 txt += "DIAGNOSTIC :\n" + diag + "\n";

 txt += "Conclusion : état antérieur à l’intervention.\n";

 document.getElementById("rapport").value = txt;
}

function printRapport(){
  let contenu = document.getElementById("rapport").value;
  let fenetre = window.open("", "", "width=600,height=600");
  fenetre.document.write("<pre>" + contenu + "</pre>");
  fenetre.document.close();
  fenetre.print();
}

function sendWhatsApp(){
  let texte = document.getElementById("rapport").value;
  let url = "https://wa.me/?text=" + encodeURIComponent(texte);
  window.open(url, "_blank");
}

</script>

</body>
</html>
