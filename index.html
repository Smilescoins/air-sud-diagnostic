<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Sud Éco-Confort</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 15px;
}

h2 { color: #3b82f6; }

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border: none;
  border-radius: 5px;
  font-weight: bold;
}

.btn-orange { background: orange; }
.btn-blue { background: #3b82f6; }
.btn-green { background: #22c55e; }

canvas {
  background: white;
  border-radius: 5px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>Air Sud Éco-Confort</h2>
<p>Un partenaire de confiance avant tout</p>

<div class="card">
<h3>Diagnostic</h3>

<input id="bp" placeholder="BP (bar)">
<input id="hp" placeholder="HP (bar)">
<input id="amp" placeholder="Intensité">
<input id="amb" placeholder="Température ambiante">
<input id="souf" placeholder="Température soufflage">

<button class="btn-orange" onclick="diagnostic()">Lancer diagnostic</button>

<pre id="result"></pre>
</div>

<div class="card">
<h3>Fiche client</h3>

<input id="client" placeholder="Nom client">
<input id="adresse" placeholder="Adresse">

<textarea id="rapport" rows="10"></textarea>

<button class="btn-blue" onclick="generate()">📄 Générer rapport</button>
<button class="btn-green" onclick="printRapport()">🖨️ PDF</button>
<button class="btn-orange" onclick="sendWhatsApp()">📲 WhatsApp</button>

<h3>Signature client</h3>

<canvas id="signature" width="300" height="150"></canvas>

<button onclick="clearSignature()">Effacer signature</button>

</div>

<script>

// SIGNATURE
let canvas = document.getElementById("signature");
let ctx = canvas.getContext("2d");
let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", () => drawing = true);
canvas.addEventListener("touchend", () => drawing = false);
canvas.addEventListener("touchmove", drawTouch);

function draw(e){
  if(!drawing) return;
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.strokeStyle = "black";

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
}

function drawTouch(e){
  e.preventDefault();
  if(!drawing) return;

  let rect = canvas.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left;
  let y = e.touches[0].clientY - rect.top;

  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function clearSignature(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// DIAGNOSTIC
function diagnostic(){
 let bp = parseFloat(document.getElementById("bp").value);
 let hp = parseFloat(document.getElementById("hp").value);

 let res = "";

 if(bp<3 && hp<10) res="🔴 Manque de fluide";
 else if(bp<3 && hp>=12) res="❄️ Problème évaporateur";
 else if(bp>=4 && hp<10) res="🔥 Problème condensation";
 else if(bp>6 && hp<12) res="⚠️ Compresseur fatigué";

 document.getElementById("result").innerText = res;
}

// RAPPORT
function generate(){
 let txt = "Rapport client\n\n";
 txt += "Client : " + document.getElementById("client").value + "\n";
 txt += "Diagnostic : " + document.getElementById("result").innerText + "\n";
 txt += "\nConclusion : état antérieur à l’intervention.";

 document.getElementById("rapport").value = txt;
}

// PDF
function printRapport(){
 let contenu = document.getElementById("rapport").value;
 let win = window.open();
 win.document.write("<pre>"+contenu+"</pre>");
 win.print();
}

// WHATSAPP
function sendWhatsApp(){
 let texte = document.getElementById("rapport").value;
 let url = "https://wa.me/?text=" + encodeURIComponent(texte);
 window.open(url);
}

</script>

</body>
</html>
