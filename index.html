<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Air Sud Éco-Confort</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f5f5f5;padding:10px;font-size:18px}
input,textarea{width:100%;padding:12px;margin:5px 0;font-size:18px}
button{width:100%;padding:15px;margin-top:10px;background:orange;color:white;border:none;font-size:18px}
.carte{background:white;padding:15px;margin-bottom:15px;border-radius:10px}
label{display:block;margin:5px 0}
canvas{border:1px solid black;margin-top:10px}
</style>
</head>

<body>

<h2>Air Sud Éco-Confort</h2>
<p>Entretien & maintenance climatisation</p>

<div class="carte">
<h3>Diagnostic</h3>
<input id="bp" placeholder="BP (bar)">
<input id="hp" placeholder="HP (bar)">
<input id="amp" placeholder="Intensité (A)">
<button onclick="diagnostic()">Analyser</button>
<p id="result"></p>
</div>

<div class="carte">
<h3>Client</h3>
<input id="client" placeholder="Nom">
<input id="adresse" placeholder="Adresse">
</div>

<div class="carte">
<h3>Prestations</h3>

<label><input type="checkbox" value="110"> Entretien monosplit (110€)</label>
<label><input type="checkbox" value="0" id="multi"> Multisplit (+50€/UI)</label>
<input id="ui" placeholder="Nombre d'UI">

<label><input type="checkbox" value="90"> Recherche de fuite (90€)</label>
<label><input type="checkbox" value="60"> Main d'œuvre recharge (60€)</label>
<label><input type="checkbox" value="110"> Traitement anticorrosion (110€)</label>
<label><input type="checkbox" value="150"> Diagnostic électrique (150€)</label>
<label><input type="checkbox" value="60"> Condensateur (60€)</label>
<label><input type="checkbox" value="20"> Fusible (20€)</label>
<label><input type="checkbox" value="15"> Connectique (15€)</label>
<label><input type="checkbox" value="40"> Schrader (40€)</label>
<label><input type="checkbox" value="80"> Brasure (80€)</label>

<input id="fluide" placeholder="Fluide €">

<button onclick="calculTotal()">Calculer total</button>
<p id="total"></p>

</div>

<div class="carte" id="doc">
<h3>Document</h3>
<pre id="text"></pre>

<h4>Signature client</h4>
<canvas id="sign1" width="300" height="100"></canvas>

<h4>Signature technicien</h4>
<canvas id="sign2" width="300" height="100"></canvas>

<button onclick="clearSign()">Effacer signatures</button>

</div>

<button onclick="generate()">Générer document</button>
<button onclick="pdf()">PDF</button>
<button onclick="whatsapp()">WhatsApp</button>

<script>

function val(id){return document.getElementById(id).value}

function diagnostic(){
let bp=parseFloat(val("bp"));
let hp=parseFloat(val("hp"));
let amp=parseFloat(val("amp"));
let res="OK";

if(bp<3 && hp<10) res="Manque de fluide";
else if(bp<3 && hp>=12) res="KVP";
else if(bp>=4 && hp<10) res="KVR";
else if(bp>6 && hp<12) res="Compresseur fatigué";

if(amp>10) res+=" + Surconsommation";

document.getElementById("result").innerText=res;
}

function calculTotal(){
let total=0;

document.querySelectorAll("input[type=checkbox]:checked").forEach(e=>{
total+=parseFloat(e.value)
})

if(document.getElementById("multi").checked){
let ui=parseInt(val("ui"))||0;
total+=ui*50;
}

let fluide=parseFloat(val("fluide"))||0;
total+=fluide;

document.getElementById("total").innerText="Total : "+total+" €";
}

function generate(){
let txt="";
txt+="Air Sud Éco-Confort\n";
txt+="Client: "+val("client")+"\n";
txt+="Adresse: "+val("adresse")+"\n\n";
txt+="Diagnostic: "+document.getElementById("result").innerText+"\n";
txt+=document.getElementById("total").innerText+"\n";

document.getElementById("text").innerText=txt;
}

async function pdf(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
let canvas=await html2canvas(document.getElementById("doc"));
let img=canvas.toDataURL("image/png");
doc.addImage(img,'PNG',10,10,180,0);
doc.save("devis.pdf");
}

function whatsapp(){
let text=document.getElementById("text").innerText;
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

// SIGNATURE
function sign(id){
let canvas=document.getElementById(id);

}


function clearSign(){
document.getElementById("sign1").getContext("2d").clearRect(0,0,300,100);
document.getElementById("sign2").getContext("2d").clearRect(0,0,300,100);
}
function initSignature(canvasId){
let canvas = document.getElementById(canvasId);
let ctx = canvas.getContext("2d");
let drawing = false;

function position(e){
let rect = canvas.getBoundingClientRect();
if(e.touches){
return {
x: e.touches[0].clientX - rect.left,
y: e.touches[0].clientY - rect.top
};
}
return {
x: e.clientX - rect.left,
y: e.clientY - rect.top
};
}

function start(e){
drawing = true;
let pos = position(e);
ctx.beginPath();
ctx.moveTo(pos.x, pos.y);
}

function move(e){
if(!drawing) return;
e.preventDefault();
let pos = position(e);
ctx.lineTo(pos.x, pos.y);
ctx.stroke();
}

function end(){
drawing = false;
}

canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", move);
canvas.addEventListener("mouseup", end);

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchmove", move);
canvas.addEventListener("touchend", end);
}

// activation
window.onload = function(){
initSignature("sign1");
initSignature("sign2");
}
</script>

</body>
</html>
