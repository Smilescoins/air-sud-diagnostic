<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Sud Éco-Confort</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:15px; }
h2 { color:#3b82f6; }
.card { background:#1e293b; padding:15px; margin-bottom:15px; border-radius:10px; }
input, textarea, select { width:100%; padding:10px; margin:5px 0; border-radius:5px; border:none; }
button { width:100%; padding:12px; margin-top:5px; border:none; border-radius:5px; font-weight:bold; }
.btn-orange { background:orange; color:white; }
.btn-blue { background:#3b82f6; color:white; }
.btn-green { background:#22c55e; color:white; }
label { display:block; margin-top:5px; }
pre { white-space: pre-wrap; }
</style>
</head>

<body>

<h2>Air Sud Éco-Confort</h2>
<p>Diagnostic Expert Climatisation</p>

<div class="card">
<h3>Mesures</h3>

<input id="bp" placeholder="BP (bar)">
<input id="hp" placeholder="HP (bar)">
<input id="amp" placeholder="Intensité mesurée (A)">
<input id="ampNom" placeholder="Intensité normale (optionnel)">
<input id="amb" placeholder="Température ambiante">
<input id="souf" placeholder="Température soufflage">

<button class="btn-orange" onclick="diagnostic()">Lancer diagnostic complet</button>

<pre id="result"></pre>
</div>

<div class="card">
<h3>Checklist visuelle</h3>

<label><input type="checkbox" id="condenseurSale"> Condenseur encrassé</label>
<label><input type="checkbox" id="evaporateurSale"> Évaporateur encrassé</label>
<label><input type="checkbox" id="ventilHS"> Ventilateur HS</label>
<label><input type="checkbox" id="givre"> Givre</label>
<label><input type="checkbox" id="bruit"> Bruit anormal</label>

</div>

<div class="card">
<h3>🔧 Dépannage électrique</h3>

<select id="panne">
<option value="">Choisir une panne</option>
<option value="ventil">Ventilateur UE ne tourne pas</option>
<option value="comp">Compresseur ne démarre pas</option>
<option value="alim">Aucune alimentation</option>
<option value="intensite">Intensité anormale</option>
</select>

<button onclick="depannage()">Afficher solution</button>

<pre id="solution"></pre>
</div>

<div class="card">
<h3>Fiche client</h3>

<input id="client" placeholder="Nom client">
<input id="adresse" placeholder="Adresse">

<textarea id="rapport" rows="10"></textarea>

<button class="btn-blue" onclick="generate()">📄 Générer rapport</button>
<button class="btn-green" onclick="saveClient()">💾 Enregistrer</button>
<button class="btn-orange" onclick="printRapport()">🖨️ PDF</button>
<button class="btn-orange" onclick="sendWhatsApp()">📲 WhatsApp</button>
</div>

<div class="card">
<h3>📂 Historique</h3>
<input id="search" placeholder="Rechercher client" oninput="searchClient()">
<ul id="history"></ul>
</div>

<script>

// HISTORIQUE
let clients = JSON.parse(localStorage.getItem("clients") || "[]");

function saveClient(){
 let entry={client:client.value,rapport:rapport.value,date:new Date().toLocaleString()};
 clients.push(entry);
 localStorage.setItem("clients",JSON.stringify(clients));
 displayHistory();
}

function displayHistory(){
 history.innerHTML="";
 clients.forEach(c=>{
 let li=document.createElement("li");
 li.innerText=c.client+" - "+c.date;
 li.onclick=()=>{client.value=c.client;rapport.value=c.rapport;}
 history.appendChild(li);
 });
}

function searchClient(){
 let val=search.value.toLowerCase();
 history.innerHTML="";
 clients.filter(c=>c.client.toLowerCase().includes(val)).forEach(c=>{
 let li=document.createElement("li");
 li.innerText=c.client+" - "+c.date;
 history.appendChild(li);
 });
}

// DIAGNOSTIC
function diagnostic(){

 let bp=parseFloat(document.getElementById("bp").value);
 let hp=parseFloat(document.getElementById("hp").value);
 let amp=parseFloat(document.getElementById("amp").value);
 let ampNom=parseFloat(document.getElementById("ampNom").value);
 let amb=parseFloat(document.getElementById("amb").value);
 let souff=parseFloat(document.getElementById("souf").value);

 let delta=amb-souf;
 let res="";

 // FRIGO
 if(bp<3 && hp<10) res+="🔴 Manque de fluide\n";
 if(bp<3 && hp>=12) res+="❄️ Problème évaporateur / détendeur\n";
 if(bp>=4 && hp<10) res+="🔥 Problème condensation\n";
 if(bp>6 && hp<12) res+="⚠️ Compresseur fatigué\n";

 // ELECTRIQUE
 if(!isNaN(amp)){
   if(amp<2) res+="⚡ Pas d’alimentation ou compresseur HS\n";
   if(amp>8) res+="⚡ Intensité élevée → contrainte\n";
 }

 // COMPARAISON INTENSITÉ
 if(!isNaN(ampNom)){
   if(amp < ampNom*0.6) res+="⚡ Intensité trop faible vs normale\n";
   if(amp > ampNom*1.3) res+="⚡ Intensité trop élevée vs normale\n";
 }

 // THERMIQUE
 if(delta<5) res+="🌡️ Mauvais rendement\n";
 if(delta>=8) res+="✅ Bon rendement\n";

 // VISUEL
 if(condenseurSale.checked) res+="🧽 Condenseur sale\n";
 if(evaporateurSale.checked) res+="🧽 Évaporateur sale\n";
 if(ventilHS.checked) res+="🌀 Ventilateur HS\n";
 if(givre.checked) res+="❄️ Givre\n";
 if(bruit.checked) res+="🔊 Bruit anormal\n";

 result.innerText=res;
}

// DEPANNAGE
function depannage(){

 let p = document.getElementById("panne").value;
 let txt="";

 if(p==="ventil"){
   txt="Ventilateur UE ne tourne pas\n\n➡️ Vérifier :\n- condensateur\n- alimentation\n- moteur\n- carte";
 }

 if(p==="comp"){
   txt="Compresseur ne démarre pas\n\n➡️ Vérifier :\n- alimentation\n- relais\n- carte\n- compresseur bloqué";
 }

 if(p==="alim"){
   txt="Aucune alimentation\n\n➡️ Vérifier :\n- disjoncteur\n- fusible\n- carte électronique";
 }

 if(p==="intensite"){
   txt="Intensité anormale\n\n➡️ Faible : manque de charge ou compresseur\n➡️ Forte : contrainte ou surchauffe";
 }

 document.getElementById("solution").innerText=txt;
}

// RAPPORT
function generate(){
 let txt="===== RAPPORT EXPERT =====\n\n";
 txt+="Client : "+client.value+"\n\n";
 txt+="DIAGNOSTIC :\n"+result.innerText+"\n";
 txt+="Conclusion : état avant intervention.\n";
 rapport.value=txt;
}

// PDF
function printRapport(){
 let w=window.open();
 w.document.write("<pre>"+rapport.value+"</pre>");
 w.print();
}

// WHATSAPP
function sendWhatsApp(){
 window.open("https://wa.me/?text="+encodeURIComponent(rapport.value));
}

displayHistory();

</script>

</body>
</html>
