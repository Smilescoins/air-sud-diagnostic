<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Sud Éco-Confort</title>

<style>
body { font-family: Arial; margin:0; }
.nav { display:flex; background:#0f172a; }
.nav button {
  flex:1; padding:12px; border:none; color:white; background:#1e293b;
}
.section { display:none; padding:15px; }
.active { display:block; }
input, textarea, select { width:100%; padding:10px; margin:5px 0; }
button { padding:10px; margin-top:5px; width:100%; }
canvas { border:1px solid black; }
</style>
</head>

<body>

<div class="nav">
<button onclick="show('diag')">🔧 Diagnostic</button>
<button onclick="show('dep')">⚡ Dépannage</button>
<button onclick="show('bon')">📋 Bon</button>
<button onclick="show('devis')">💰 Devis</button>
</div>

<!-- DIAGNOSTIC -->
<div id="diag" class="section active">
<h3>Diagnostic</h3>
<input id="bp" placeholder="BP">
<input id="hp" placeholder="HP">
<input id="amp" placeholder="Intensité">
<button onclick="diagnostic()">Analyser</button>
<pre id="res"></pre>
</div>

<!-- DEPANNAGE -->
<div id="dep" class="section">
<h3>Dépannage électrique</h3>
<select id="panne">
<option value="">Choisir panne</option>
<option value="ventil">Ventilateur UE HS</option>
<option value="comp">Compresseur ne démarre pas</option>
<option value="alim">Pas d’alimentation</option>
</select>
<button onclick="depannage()">Afficher</button>
<pre id="depRes"></pre>
</div>

<!-- BON -->
<div id="bon" class="section">
<h3>Bon d’intervention</h3>
<input id="client" placeholder="Client">
<input id="adresse" placeholder="Adresse">

<label><input type="checkbox" data-price="110"> Entretien mono</label>
<label><input type="checkbox" id="multiCheck"> Multisplit</label>
<input id="nbUI" placeholder="Nb UI">

<label><input type="checkbox" data-price="90"> Recherche fuite</label>
<label><input type="checkbox" data-price="60"> Recharge MO</label>
<label><input type="checkbox" data-price="150"> Dépannage électrique</label>
<label><input type="checkbox" data-price="110"> Anticorrosion</label>

<input id="fluide" placeholder="Fluide €">

<h3>Total : <span id="total">0 €</span></h3>

<canvas id="sig" width="300" height="150"></canvas>
<button onclick="calc()">Calculer</button>
</div>

<!-- DEVIS -->
<div id="devis" class="section">
<h3>Devis</h3>
<textarea id="devisTxt"></textarea>
<button onclick="genDevis()">Générer</button>
<button onclick="pdf()">PDF</button>
<button onclick="wa()">WhatsApp</button>
</div>

<script>

function show(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// DIAGNOSTIC
function diagnostic(){
 let bp=parseFloat(bp.value);
 let hp=parseFloat(hp.value);
 let amp=parseFloat(amp.value);
 let r="";
 if(bp<3 && hp<10) r="Manque fluide";
 else if(bp<3 && hp>=12) r="Détendeur / évapo";
 if(amp<2) r+=" | Pas alim";
 res.innerText=r;
}

// DEPANNAGE
function depannage(){
 let p=panne.value;
 let r="";
 if(p==="ventil") r="Vérifier condensateur / moteur";
 if(p==="comp") r="Relais / carte / compresseur";
 if(p==="alim") r="Disjoncteur / fusible";
 depRes.innerText=r;
}

// BON
function calc(){
 let t=0;
 document.querySelectorAll("[data-price]").forEach(e=>{
  if(e.checked) t+=parseFloat(e.dataset.price);
 });
 if(multiCheck.checked){
  let ui=parseInt(nbUI.value);
  if(ui>=2) t+=160+(ui-2)*50;
 }
 let f=parseFloat(fluide.value);
 if(!isNaN(f)) t+=f;
 total.innerText=t+" €";
}

// DEVIS
function genDevis(){
 devisTxt.value="Devis client "+client.value+"\nTotal "+total.innerText;
}

function pdf(){
 let w=window.open();
 w.document.write(devisTxt.value);
 w.print();
}

function wa(){
 window.open("https://wa.me/?text="+encodeURIComponent(devisTxt.value));
}

</script>

</body>
</html>
