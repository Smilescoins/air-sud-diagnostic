<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Sud Éco-Confort</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:15px; }
h2 { color:#3b82f6; }
.card { background:#1e293b; padding:15px; margin-bottom:15px; border-radius:10px; }
input, textarea { width:100%; padding:10px; margin:5px 0; border-radius:5px; border:none; }
button { width:100%; padding:12px; margin-top:5px; border:none; border-radius:5px; font-weight:bold; }
.btn-orange { background:orange; color:white; }
.btn-blue { background:#3b82f6; color:white; }
.btn-green { background:#22c55e; color:white; }
label { display:block; margin-top:5px; }
pre { white-space: pre-wrap; }
canvas { background:white; border-radius:5px; }
img { width:100%; margin-top:10px; border-radius:5px; }
</style>
</head>

<body>

<h2>Air Sud Éco-Confort</h2>

<div class="card">
<h3>Diagnostic</h3>

<input id="bp" placeholder="BP (bar)">
<input id="hp" placeholder="HP (bar)">
<input id="amp" placeholder="Intensité">
<input id="amb" placeholder="Température ambiante">
<input id="souf" placeholder="Température soufflage">

<button class="btn-orange" onclick="diagnostic()">Lancer diagnostic</button>

<pre id="result"></pre>
</div>

<div class="card">
<h3>Checklist visuelle</h3>

<label><input type="checkbox" id="condenseurSale"> Condenseur encrassé</label>
<label><input type="checkbox" id="evaporateurSale"> Évaporateur encrassé</label>
<label><input type="checkbox" id="ventilHS"> Ventilateur HS</label>
<label><input type="checkbox" id="givre"> Givre</label>
<label><input type="checkbox" id="bruit"> Bruit anormal</label>

</div>

<div class="card">
<h3>Fiche client</h3>

<input id="client" placeholder="Nom client">
<input id="adresse" placeholder="Adresse">

<textarea id="rapport" rows="8"></textarea>

<button class="btn-blue" onclick="generate()">📄 Générer rapport</button>
<button class="btn-green" onclick="saveClient()">💾 Enregistrer</button>
<button class="btn-orange" onclick="printRapport()">🖨️ PDF</button>
<button class="btn-orange" onclick="sendWhatsApp()">📲 WhatsApp</button>

<h3>📸 Photo</h3>
<input type="file" accept="image/*" onchange="loadPhoto(event)">
<img id="photoPreview">

<h3>✍️ Signature</h3>
<canvas id="signature" width="300" height="150"></canvas>
<button onclick="clearSignature()">Effacer</button>

</div>

<div class="card">
<h3>📂 Historique</h3>
<input id="search" placeholder="Rechercher client" oninput="searchClient()">
<ul id="history"></ul>
</div>

<script>

let clients = JSON.parse(localStorage.getItem("clients") || "[]");

function diagnostic(){

 let bpVal = parseFloat(document.getElementById("bp").value);
 let hpVal = parseFloat(document.getElementById("hp").value);
 let ampVal = parseFloat(document.getElementById("amp").value);
 let ambVal = parseFloat(document.getElementById("amb").value);
 let souffVal = parseFloat(document.getElementById("souf").value);

 let delta = ambVal - souffVal;
 let res = "";

 if(isNaN(bpVal) || isNaN(hpVal)){
   res="⚠️ Renseigne BP et HP minimum";
 } else {

   if(bpVal<3 && hpVal<10) res+="🔴 Manque de fluide\n";
   if(bpVal<3 && hpVal>=12) res+="❄️ Problème évaporateur\n";
   if(bpVal>=4 && hpVal<10) res+="🔥 Problème condensation\n";
   if(bpVal>6 && hpVal<12) res+="⚠️ Compresseur fatigué\n";

   if(!isNaN(ampVal)){
     if(ampVal<2) res+="⚡ Pas d’alimentation\n";
     if(ampVal>8) res+="⚡ Intensité élevée\n";
   }

   if(!isNaN(delta)){
     if(delta<5) res+="🌡️ Mauvais rendement\n";
     if(delta>=8) res+="✅ Bon rendement\n";
   }

   if(document.getElementById("condenseurSale").checked) res+="🧽 Condenseur sale\n";
   if(document.getElementById("evaporateurSale").checked) res+="🧽 Évaporateur sale\n";
   if(document.getElementById("ventilHS").checked) res+="🌀 Ventilateur HS\n";
   if(document.getElementById("givre").checked) res+="❄️ Givre\n";
   if(document.getElementById("bruit").checked) res+="🔊 Bruit anormal\n";
 }

 document.getElementById("result").innerText = res;
}

function generate(){
 let txt="Rapport\nClient : "+client.value+"\nDiagnostic :\n"+result.innerText;
 rapport.value=txt;
}

function saveClient(){
 let entry={client:client.value,rapport:rapport.value,date:new Date().toLocaleString()};
 clients.push(entry);
 localStorage.setItem("clients",JSON.stringify(clients));
 displayHistory();
}

function displayHistory(){
 history.innerHTML="";
 clients.forEach(c=>{
 let li=document.createElement("li");
 li.innerText=c.client+" - "+c.date;
 li.onclick=()=>{client.value=c.client;rapport.value=c.rapport;}
 history.appendChild(li);
 });
}

function searchClient(){
 let val=search.value.toLowerCase();
 history.innerHTML="";
 clients.filter(c=>c.client.toLowerCase().includes(val)).forEach(c=>{
 let li=document.createElement("li");
 li.innerText=c.client+" - "+c.date;
 history.appendChild(li);
 });
}

function loadPhoto(e){
 document.getElementById("photoPreview").src = URL.createObjectURL(e.target.files[0]);
}

let canvas=document.getElementById("signature");
let ctx=canvas.getContext("2d");
let drawing=false;

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;
canvas.onmousemove=e=>{
 if(!drawing) return;
 ctx.lineTo(e.offsetX,e.offsetY);
 ctx.stroke();
 ctx.beginPath();
 ctx.moveTo(e.offsetX,e.offsetY);
};

function clearSignature(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

function printRapport(){
 let w=window.open();
 w.document.write("<pre>"+rapport.value+"</pre>");
 w.print();
}

function sendWhatsApp(){
 window.open("https://wa.me/?text="+encodeURIComponent(rapport.value));
}

displayHistory();

</script>

</body>
</html>
