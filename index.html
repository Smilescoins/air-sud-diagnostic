<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Sud Éco-Confort</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
input, textarea { width:100%; padding:10px; margin:5px 0; }
button { width:100%; padding:12px; background:orange; border:none; color:white; font-weight:bold; }
</style>
</head>

<body>

<h2>Air Sud Éco-Confort</h2>
<p><i>Un partenaire de confiance avant tout</i></p>

<div class="card">
<h3>Diagnostic</h3>

<input id="bp" placeholder="BP (bar)">
<input id="hp" placeholder="HP (bar)">
<input id="amp" placeholder="Intensité">
<input id="amb" placeholder="Température ambiante">
<input id="souf" placeholder="Température soufflage">

<button onclick="diagnostic()">Lancer diagnostic</button>

<pre id="result"></pre>
</div>

<div class="card">
<h3>Fiche client</h3>

<input id="client" placeholder="Nom client">
<input id="adresse" placeholder="Adresse">

<textarea id="rapport" rows="10"></textarea>

<button onclick="generate()">📄 Générer rapport complet</button>
</div>

<script>

function diagnostic(){

 let bp = parseFloat(document.getElementById("bp").value);
 let hp = parseFloat(document.getElementById("hp").value);
 let amp = parseFloat(document.getElementById("amp").value);
 let amb = parseFloat(document.getElementById("amb").value);
 let souff = parseFloat(document.getElementById("souf").value);

 let delta = amb - souff;

 let res = "";

 if(isNaN(bp) || isNaN(hp)){
   res="⚠️ Renseigne BP et HP minimum";
 }

 else{

   if(bp<3 && hp<10){
     res += "🔴 Manque de fluide probable\n👉 Vérifier fuite\n👉 Test azote\n\n";
   }

   if(bp<3 && hp>=12){
     res += "❄️ Problème évaporateur / KVP\n👉 Vérifier détendeur / air\n\n";
   }

   if(bp>=4 && hp<10){
     res += "🔥 Problème condensation / KVR\n👉 Vérifier ventilateur\n\n";
   }

   if(bp>6 && hp<12){
     res += "⚠️ Compresseur fatigué\n👉 Mauvaise compression\n\n";
   }

   if(hp>20){
     res += "🔥 Condenseur encrassé\n👉 Nettoyage nécessaire\n\n";
   }

   if(!isNaN(delta)){
     if(delta < 5){
       res += "🌡️ Mauvais rendement\n\n";
     }
     else if(delta >=8){
       res += "✅ Bon rendement\n\n";
     }
   }

   if(!isNaN(amp)){
     if(amp < 3){
       res += "⚡ Intensité faible\n";
     }
     else if(amp > 8){
       res += "⚡ Intensité élevée\n";
     }
   }

 }

 document.getElementById("result").innerText = res;
}

function generate(){

 let client = document.getElementById("client").value;
 let adresse = document.getElementById("adresse").value;
 let bp = document.getElementById("bp").value;
 let hp = document.getElementById("hp").value;
 let amp = document.getElementById("amp").value;
 let amb = document.getElementById("amb").value;
 let souff = document.getElementById("souf").value;
 let diag = document.getElementById("result").innerText;

 let date = new Date().toLocaleString();

 let txt = "";

 txt += "===== RAPPORT D'INTERVENTION =====\n\n";
 txt += "Entreprise : Air Sud Éco-Confort\n\n";
 txt += "Date : " + date + "\n\n";
 txt += "Client : " + client + "\n";
 txt += "Adresse : " + adresse + "\n\n";

 txt += "BP : " + bp + " bar\n";
 txt += "HP : " + hp + " bar\n";
 txt += "Intensité : " + amp + " A\n";
 txt += "Température ambiante : " + amb + " °C\n";
 txt += "Température soufflage : " + souff + " °C\n\n";

 txt += "DIAGNOSTIC :\n" + diag + "\n\n";

 txt += "Conclusion : Etat de l'installation antérieur à l'intervention.\n";
 txt += "Aucune responsabilité engagée.\n\n";

 txt += "Signature technicien : __________\n";
 txt += "Signature client : __________\n";

 document.getElementById("rapport").value = txt;
}

</script>

</body>
</html>
