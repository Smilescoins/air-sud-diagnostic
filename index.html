<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Air Sud Éco-Confort</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family:Arial;background:#f5f5f5;padding:10px;}
.card {background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
input, textarea {width:100%;padding:8px;margin:5px 0;}
button {width:100%;padding:12px;background:orange;color:white;border:none;margin-top:5px;}
canvas {border:1px solid black;width:100%;height:150px;touch-action:none;}
</style>
</head>

<body>

<h2>Air Sud Éco-Confort</h2>

<div class="card">
<input id="client" placeholder="Nom client">
<input id="adresse" placeholder="Adresse">
</div>

<div class="card">
<input id="bp" placeholder="BP">
<input id="hp" placeholder="HP">
<button onclick="diagnostic()">Diagnostic</button>
<pre id="result"></pre>
</div>

<div class="card">
<label><input type="checkbox" class="p" value="90"> Recherche fuite</label><br>
<label><input type="checkbox" class="p" value="150"> Diagnostic électrique</label><br>

<input id="fluide" placeholder="Fluide €">
<button onclick="calc()">Total</button>
Total : <span id="total">0</span> €
</div>

<div class="card">
Signature client :
<canvas id="sign"></canvas>
<button onclick="clearSign()">Effacer</button>
</div>

<div class="card">
<button onclick="generate()">Générer rapport</button>
<button onclick="pdf()">PDF</button>
<textarea id="rapport"></textarea>
</div>

<script>

function diagnostic(){
let bp=parseFloat(document.getElementById("bp").value);
let hp=parseFloat(document.getElementById("hp").value);

let txt="";
if(bp<3 && hp<10) txt="Manque de fluide";
if(bp>6 && hp<12) txt="Compresseur HS probable";

document.getElementById("result").innerText=txt;
}

function calc(){
let t=0;
document.querySelectorAll(".p").forEach(c=>{if(c.checked)t+=+c.value});
t+=+document.getElementById("fluide").value||0;
document.getElementById("total").innerText=t;
}

function generate(){
rapport.value=
"Client:"+client.value+"\n"+
"Adresse:"+adresse.value+"\n\n"+
"Diagnostic:\n"+result.innerText+
"\nTotal:"+total.innerText+"€";
}

function pdf(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text(rapport.value,10,10);

// signature intégrée
let img=canvas.toDataURL("image/png");
doc.addImage(img,'PNG',10,60,100,40);

doc.save("rapport.pdf");
}

// SIGNATURE TACTILE
let canvas=document.getElementById("sign");
let ctx=canvas.getContext("2d");

let drawing=false;

canvas.addEventListener("touchstart",e=>{
drawing=true;
let t=e.touches[0];
ctx.moveTo(t.clientX,t.clientY);
});

canvas.addEventListener("touchmove",e=>{
if(!drawing)return;
let t=e.touches[0];
ctx.lineTo(t.clientX,t.clientY);
ctx.stroke();
});

canvas.addEventListener("touchend",()=>drawing=false);

function clearSign(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

</script>

</body>
</html>
