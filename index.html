<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Air Sud Éco-Confort</title>

<style>
body {font-family:Arial;background:#f5f5f5;padding:10px;}
.card {background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
input, textarea {width:100%;padding:8px;margin:5px 0;}
button {width:100%;padding:12px;background:orange;color:white;border:none;margin-top:5px;}
canvas {border:1px solid black;width:100%;height:100px;}
</style>
</head>

<body>

<h2>Air Sud Éco-Confort</h2>

<div class="card">
<h3>Client</h3>
<input id="client" placeholder="Nom client">
<input id="adresse" placeholder="Adresse">
</div>

<div class="card">
<h3>Photo intervention</h3>
<input type="file" id="photo">
</div>

<div class="card">
<h3>Diagnostic</h3>
<input id="bp" placeholder="BP">
<input id="hp" placeholder="HP">
<input id="amp" placeholder="Intensité">
<input id="amb" placeholder="Température ambiante">
<input id="souf" placeholder="Température soufflage">

<button onclick="diagnostic()">Lancer diagnostic</button>
<pre id="result"></pre>
</div>

<div class="card">
<h3>Devis</h3>

<label><input type="checkbox" value="110"> Entretien monosplit</label><br>
<label><input type="checkbox" value="50"> Multisplit</label><br>
<label><input type="checkbox" value="90"> Recherche fuite</label><br>
<label><input type="checkbox" value="60"> Recharge MO</label><br>
<label><input type="checkbox" value="110"> Anticorrosion</label><br>
<label><input type="checkbox" value="150"> Diagnostic électrique</label><br>
<label><input type="checkbox" value="60"> Condensateur</label><br>
<label><input type="checkbox" value="20"> Fusible</label><br>
<label><input type="checkbox" value="15"> Connectique</label><br>
<label><input type="checkbox" value="40"> Schrader</label><br>
<label><input type="checkbox" value="80"> Brasure</label><br>

<input id="fluide" placeholder="Fluide (€)">
<button onclick="calculTotal()">Calculer total</button>

<h3>Total : <span id="total">0</span> €</h3>
</div>

<div class="card">
<h3>Signatures</h3>

Client :
<canvas id="signClient"></canvas>
<button onclick="clearCanvas('signClient')">Effacer</button>

Technicien :
<canvas id="signTech"></canvas>
<button onclick="clearCanvas('signTech')">Effacer</button>
</div>

<div class="card">
<button onclick="generate()">Générer document</button>
<button onclick="printDoc()">PDF</button>
<button onclick="sendWhatsApp()">WhatsApp</button>
<button onclick="saveHistorique()">Sauvegarder client</button>

<textarea id="rapport" rows="12"></textarea>
</div>

<div class="card">
<h3>Historique</h3>
<pre id="historique"></pre>
</div>

<script>

function diagnostic(){
let bp=parseFloat(bp.value);
let hp=parseFloat(hp.value);
let amp=parseFloat(document.getElementById("amp").value);
let amb=parseFloat(document.getElementById("amb").value);
let souf=parseFloat(document.getElementById("souf").value);

let res="";

if(bp<3 && hp<10){
res+="Manque de fluide → recherche fuite\n";
document.querySelectorAll("input[type=checkbox]")[2].checked=true;
}

if(bp>6 && hp<12){
res+="Compresseur fatigué (déjà HS possible)\n";
}

if(hp>20){
res+="Condenseur encrassé\n";
}

if(!isNaN(amb)&&!isNaN(souf)){
let delta=amb-souf;
if(delta<5) res+="Mauvais rendement\n";
if(delta>8) res+="Bon rendement\n";
}

if(amp>8){
res+="Intensité élevée → contrôle électrique\n";
document.querySelectorAll("input[type=checkbox]")[5].checked=true;
}

document.getElementById("result").innerText=res;
}

function calculTotal(){
let total=0;
document.querySelectorAll("input[type=checkbox]").forEach(c=>{
if(c.checked) total+=parseFloat(c.value);
});
let fluide=parseFloat(document.getElementById("fluide").value)||0;
total+=fluide;
document.getElementById("total").innerText=total;
}

function generate(){
let txt="";
let date=new Date().toLocaleString();

txt+="BON D’INTERVENTION\n\n";
txt+="Date : "+date+"\n";
txt+="Client : "+client.value+"\n";
txt+="Adresse : "+adresse.value+"\n\n";
txt+="Diagnostic :\n"+result.innerText+"\n\n";
txt+="Total : "+total.innerText+" €\n";

rapport.value=txt;
}

function printDoc(){
let w=window.open("");
w.document.write("<pre>"+rapport.value+"</pre>");
w.print();
}

function sendWhatsApp(){
let text=encodeURIComponent(rapport.value);
window.open("https://wa.me/?text="+text);
}

function saveHistorique(){
let data=rapport.value+"\n----------------\n";
let old=localStorage.getItem("hist")||"";
localStorage.setItem("hist",data+old);
document.getElementById("historique").innerText=localStorage.getItem("hist");
}

function setupCanvas(id){
let canvas=document.getElementById(id);
let ctx=canvas.getContext("2d");
let drawing=false;

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mousemove",(e)=>{
if(!drawing)return;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
});
}

function clearCanvas(id){
let canvas=document.getElementById(id);
canvas.getContext("2d").clearRect(0,0,canvas.width,canvas.height);
}

setupCanvas("signClient");
setupCanvas("signTech");

document.getElementById("historique").innerText=localStorage.getItem("hist")||"";

</script>

</body>
</html>
