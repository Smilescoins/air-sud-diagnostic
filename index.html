<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Air Sud Éco-Confort V3</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:orange;color:white;cursor:pointer}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:10px}
</style>
</head>

<body>

<h1>Air Sud Éco-Confort 🔧</h1>

<div class="card">
<h2>Mode USA Guidé</h2>

<button onclick="startGuided('start_fail')">🔌 Pas de démarrage</button>
<button onclick="startGuided('no_cold')">❄️ Pas de froid</button>
<button onclick="startGuided('trip')">⚡ Disjoncte</button>
<button onclick="startGuided('random')">🔄 Aléatoire</button>

<div id="guided" style="margin-top:20px;"></div>
</div>

<script>

let guidedState = {step:0,scenario:null,data:{}};

function startGuided(s){
 guidedState={step:1,scenario:s,data:{}};
 nextStep();
}

function answer(v){
 guidedState.data["s"+guidedState.step]=v;
 guidedState.step++;
 nextStep();
}

function nextStep(){

 let s=guidedState.scenario;
 let st=guidedState.step;
 let out="";

 // CAS 1
 if(s==="start_fail"){
  if(st===1) out="Machine démarre ?<br><button onclick='answer(0)'>NON</button><button onclick='answer(1)'>OUI</button>";
  else if(st===2) out="Tension arrivée ?<br><button onclick='answer(0)'>NON</button><button onclick='answer(1)'>OUI</button>";
  else if(st===3){
    if(guidedState.data.s2==0) out="💥 Défaut alimentation";
    else out="Carte réagit ?<br><button onclick='answer(0)'>NON</button><button onclick='answer(1)'>OUI</button>";
  }
  else if(st===4){
    if(guidedState.data.s3==0) out="💥 Carte électronique HS";
    else out="Compresseur tente ?<br><button onclick='answer(0)'>NON</button><button onclick='answer(1)'>OUI</button>";
  }
  else out="💥 Condensateur ou compresseur";
 }

 // CAS 2
 if(s==="no_cold"){
  if(st===1) out="Compresseur tourne ?<br><button onclick='answer(0)'>NON</button><button onclick='answer(1)'>OUI</button>";
  else if(st===2){
    if(guidedState.data.s1==0) out="💥 Panne électrique";
    else out="Bon débit air ?<br><button onclick='answer(0)'>NON</button><button onclick='answer(1)'>OUI</button>";
  }
  else if(st===3){
    if(guidedState.data.s2==0) out="💥 Ventilation UI";
    else out="ΔT correct ?<br><button onclick='answer(0)'>FAIBLE</button><button onclick='answer(1)'>BON</button>";
  }
  else out="💥 Fluide ou restriction";
 }

 // CAS 3
 if(s==="trip"){
  if(st===1) out="Quand ?<br><button onclick='answer(1)'>Démarrage</button><button onclick='answer(2)'>Fonctionnement</button>";
  else if(st===2){
    if(guidedState.data.s1==1) out="Bzzz ?<br><button onclick='answer(0)'>NON</button><button onclick='answer(1)'>OUI</button>";
    else out="💥 Intensité élevée / condensation";
  }
  else out="💥 Condensateur ou compresseur";
 }

 // CAS 4
 if(s==="random"){
  if(st===1) out="Quand ?<br><button onclick='answer(1)'>Chaud</button><button onclick='answer(2)'>Froid</button>";
  else if(st===2){
    if(guidedState.data.s1==1) out="💥 Surchauffe / condensation";
    else out="💥 Carte ou condensateur";
  }
 }

 document.getElementById("guided").innerHTML=out;
}

</script>

</body>
</html>
