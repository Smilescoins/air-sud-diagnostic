<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Assistant Climatisation</title>

<style>
body {
    font-family: Arial;
    background: #0b3d5c;
    color: white;
    text-align: center;
    padding: 20px;
}
h1 { color: #00c3ff; }
button {
    width: 90%;
    padding: 15px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #ff7b00;
    color: white;
}
.section { display:none; }
.active { display:block; }
.box {
    background:#123;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}
input {
    width: 90%;
    padding:10px;
    margin:5px;
}
</style>
</head>

<body>

<h1>Assistant Diagnostic Clim</h1>
<p>Outil simple pour technicien terrain</p>

<!-- MENU -->
<div id="menu" class="active">
<button onclick="show('diag')">Diagnostic</button>
<button onclick="show('client')">Clients</button>
<button onclick="show('historique')">Historique</button>
<button onclick="show('resume')">Résumé</button>
</div>

<!-- DIAGNOSTIC -->
<div id="diag" class="section">
<h2>Diagnostic</h2>
<button onclick="result('froid')">Ne fait plus de froid</button>
<button onclick="result('chaud')">Ne fait plus de chaud</button>
<button onclick="result('ventilation')">Ventile seulement</button>
<button onclick="result('givre')">Givre</button>
<button onclick="result('demarre')">Ne démarre pas</button>

<div id="res" class="box"></div>

<button onclick="back()">Retour</button>
</div>

<!-- CLIENT -->
<div id="client" class="section">
<h2>Client</h2>
<input id="nom" placeholder="Nom client">
<input id="tel" placeholder="Téléphone">
<button onclick="saveClient()">Enregistrer</button>

<div id="clientList" class="box"></div>

<button onclick="back()">Retour</button>
</div>

<!-- HISTORIQUE -->
<div id="historique" class="section">
<h2>Historique</h2>
<div id="historyList" class="box"></div>
<button onclick="back()">Retour</button>
</div>

<!-- RESUME -->
<div id="resume" class="section">
<h2>Résumé intervention</h2>
<div id="resumeText" class="box">Aucun diagnostic</div>
<button onclick="back()">Retour</button>
</div>

<script>

function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById('menu').classList.remove('active');
    document.getElementById(id).classList.add('active');
}

function back(){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById('menu').classList.add('active');
}

function result(type){
    let txt="";

    if(type=="froid"){txt="Manque de fluide ou fuite probable";}
    if(type=="chaud"){txt="Problème cycle chaud ou vanne";}
    if(type=="ventilation"){txt="Compresseur non actif";}
    if(type=="givre"){txt="Manque fluide ou débit air faible";}
    if(type=="demarre"){txt="Problème électrique";}

    document.getElementById("res").innerHTML = txt;
    document.getElementById("resumeText").innerHTML = txt;

    let hist = localStorage.getItem("hist") || "";
    hist += "<br>"+txt;
    localStorage.setItem("hist", hist);
    document.getElementById("historyList").innerHTML = hist;
}

function saveClient(){
    let nom = document.getElementById("nom").value;
    let tel = document.getElementById("tel").value;

    let data = localStorage.getItem("clients") || "";
    data += "<br>"+nom+" - "+tel;
    localStorage.setItem("clients", data);

    document.getElementById("clientList").innerHTML = data;
}

window.onload = function(){
    document.getElementById("historyList").innerHTML = localStorage.getItem("hist") || "";
    document.getElementById("clientList").innerHTML = localStorage.getItem("clients") || "";
}

</script>

</body>
</html>
