<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC Latino Pro</title>

<style>
body{font-family:Arial;background:#111;color:#fff;padding:15px}
input,select{width:100%;padding:12px;margin:6px 0;font-size:16px}
button{width:100%;padding:15px;background:#ff6600;color:white;border:none;font-size:18px;margin-top:5px}
.card{background:#1c1c1c;padding:15px;margin-bottom:10px;border-radius:10px}
.result{white-space:pre-wrap}
</style>
</head>

<body>

<h2>HVAC Latino Pro</h2>

<div class="card">
<input id="bp" placeholder="Presión baja (bar)">
<input id="hp" placeholder="Presión alta (bar)">
<input id="dt" placeholder="Delta T (°C)">
<input id="amp" placeholder="Corriente (A)">
<input id="tempExt" placeholder="Temperatura exterior (°C)">

<input id="sh" placeholder="Sobrecalentamiento (°C)">
<input id="sr" placeholder="Subenfriamiento (°C)">

<select id="ventiloExt">
<option value="">Ventilador condensador</option>
<option value="ok">OK</option>
<option value="hs">Falla</option>
</select>

<select id="ventiloInt">
<option value="">Ventilador evaporador</option>
<option value="ok">OK</option>
<option value="hs">Falla</option>
</select>

<select id="givre">
<option value="">Escarcha</option>
<option value="ninguno">Ninguna</option>
<option value="ligero">Ligera</option>
<option value="importante">Importante</option>
</select>

<select id="tuyauAsp">
<option value="">Tubería de aspiración</option>
<option value="fria">Fría</option>
<option value="templada">Templada</option>
<option value="caliente">Caliente</option>
</select>

<select id="tuyauLiquide">
<option value="">Línea líquida</option>
<option value="caliente">Caliente</option>
<option value="normal">Normal</option>
<option value="fria">Fría</option>
</select>

<button onclick="diag()">Analizar</button>
<button onclick="guardarCliente()">Guardar cliente</button>
<button onclick="verClientes()">Ver clientes</button>
<button onclick="borrarClientes()">Borrar clientes</button>
<button onclick="mostrarHistorial()">Ver historial</button>
<button onclick="guardarHistorial(document.getElementById('result').textContent)">Guardar intervención</button>
<button onclick="borrarHistorial()">Borrar historial</button>
  <button onclick="generarInforme()">Generar informe</button>
</div>

<div class="card result" id="result">Resultado...</div>

<script>

function val(id){
  return parseFloat(document.getElementById(id).value) || 0;
}

function diag(){

let bp = val("bp");
let hp = val("hp");
let dt = val("dt");
let amp = val("amp");
let tempExt = val("tempExt");
let sh = val("sh");
let sr = val("sr");

if(bp==0 && hp==0 && dt==0 && amp==0 && tempExt==0 && sh==0 && sr==0){
    document.getElementById("result").textContent = "⚠️ Introducir valores";
    return;
}

let ventiloExt = document.getElementById("ventiloExt").value;
let ventiloInt = document.getElementById("ventiloInt").value;

let txt="";
let certitude=0;
let incoherente=false;

if(bp<3 && hp>20){incoherente=true;}
if(ventiloExt==="hs" && hp>20){incoherente=true;}

if(sh>15){
txt+="🔥 SOBRECALENTAMIENTO ALTO\n👉 Falta de refrigerante probable\n";
certitude+=2;
}

if(sh<3 && sh>0){
txt+="❄️ SOBRECALENTAMIENTO BAJO\n👉 Problema en válvula de expansión\n";
certitude+=2;
}

if(sr>15){
txt+="💧 SUBENFRIAMIENTO ALTO\n👉 Posible sobrecarga\n";
certitude+=2;
}

if(sr<3 && sr>0){
txt+="💧 SUBENFRIAMIENTO BAJO\n👉 Falta de refrigerante posible\n";
certitude+=2;
}

if(!incoherente && bp<3 && hp<10){
txt+="\n🔴 FALTA DE REFRIGERANTE IMPORTANTE\n";
certitude+=3;
}

else if(!incoherente && bp>6 && hp<12){
txt+="\n⚠️ COMPRESOR FATIGADO\n";
certitude+=3;
}

if(hp>20){
txt+="\n🔥 PROBLEMA DE CONDENSADOR\n";
}

if(ventiloExt==="hs"){
txt+="\n⚡ VENTILADOR CONDENSADOR DEFECTUOSO\n";
}

if(ventiloInt==="hs"){
txt+="\n❄️ VENTILADOR EVAPORADOR DEFECTUOSO\n";
}

if(incoherente){
txt="⚠️ DIAGNÓSTICO INCIERTO\n\nRevisar problema evidente\n";
certitude=1;
}

if(txt===""){
txt="ℹ️ Sin fallo claro detectado\n";
}

txt+="\n\n🎯 NIVEL DE CONFIANZA : ";

if(certitude>=6){txt+="ALTO";}
else if(certitude>=3){txt+="MEDIO";}
else{txt+="BAJO";}

document.getElementById("result").textContent=txt;
}

// HISTORIAL PROPRE
function guardarHistorial(txt){
    let hist = JSON.parse(localStorage.getItem("historial") || "[]");
    hist.push(txt);
    localStorage.setItem("historial", JSON.stringify(hist));
}

function mostrarHistorial(){
    let hist = JSON.parse(localStorage.getItem("historial") || "[]");
    if(hist.length===0){alert("Sin historial"); return;}
    alert(hist.join("\n\n----------------\n\n"));
}

function borrarHistorial(){
    localStorage.removeItem("historial");
    alert("Historial borrado");
}

// CLIENTS PROPRE
function guardarCliente(){
    let nombre = prompt("Nombre del cliente:");
    if(!nombre) return;

    let tel = prompt("Teléfono:");
    let data = JSON.parse(localStorage.getItem("clientes") || "[]");

    data.push(nombre + " - " + tel);
    localStorage.setItem("clientes", JSON.stringify(data));
}

function verClientes(){
    let data = JSON.parse(localStorage.getItem("clientes") || "[]");
    if(data.length===0){alert("Sin clientes"); return;}
    alert(data.join("\n"));
}

function borrarClientes(){
    localStorage.removeItem("clientes");
    alert("Clientes borrados");
}
function generarInforme(){

    let resultado = document.getElementById("result").textContent;

    if(!resultado || resultado==="Resultado..." || resultado.includes("Introducir valores")){
        alert("⚠️ Realizar diagnóstico primero");
        return;
    }

    let fecha = new Date().toLocaleString();

    let informe = "📋 INFORME HVAC\n\n";
    informe += "Fecha: " + fecha + "\n\n";
    informe += resultado;

   let url = "https://wa.me/?text=" + encodeURIComponent(informe);

// ouverture directe WhatsApp
window.location.href = url;
}
</script>

</body>
</html>
