<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC Latino Pro</title>

<style>
body{font-family:Arial;background:#111;color:white;padding:15px;}
h1{color:#ff6600;}
.card{background:#1c1c1c;padding:15px;border-radius:10px;margin-bottom:10px;}
input, select{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;font-size:16px;}
button{width:100%;padding:12px;background:#ff6600;color:white;border:none;border-radius:10px;font-size:18px;margin-top:8px;}
.result{background:#222;padding:15px;border-radius:10px;margin-top:10px;white-space:pre-wrap;}
</style>
</head>

<body>

<h1>HVAC Latino Pro</h1>

<div class="card">

<input id="cliente" placeholder="Cliente">

<input id="bp" placeholder="BP (bar)">
<input id="hp" placeholder="HP (bar)">
<input id="dt" placeholder="Delta T">
<input id="amp" placeholder="Intensidad">

<input id="sh" placeholder="Sobrecalentamiento">
<input id="sr" placeholder="Subenfriamiento">

<select id="ventiloExt">
<option value="">Ventilador exterior</option>
<option value="ok">OK</option>
<option value="hs">HS</option>
</select>

<select id="ventiloInt">
<option value="">Ventilador interior</option>
<option value="ok">OK</option>
<option value="hs">HS</option>
</select>

<button onclick="diag()">ANALIZAR</button>
<button onclick="save()">GUARDAR</button>
<button onclick="showHistory()">HISTORIAL</button>
<button onclick="deleteClient()">BORRAR CLIENTE</button>

</div>

<div id="result" class="result">Esperando datos...</div>

<script>

function diag(){

let bp = document.getElementById("bp").value;
let hp = document.getElementById("hp").value;
let dt = document.getElementById("dt").value;
let amp = document.getElementById("amp").value;
let sh = document.getElementById("sh").value;
let sr = document.getElementById("sr").value;

// 🔒 sécurité intégrée
if(bp==="" && hp==="" && dt==="" && amp==="" && sh==="" && sr===""){
  document.getElementById("result").innerText =
  "⚠️ Introducir datos antes de analizar";
  return;
}

// conversion
bp = parseFloat(bp) || 0;
hp = parseFloat(hp) || 0;
dt = parseFloat(dt) || 0;
amp = parseFloat(amp) || 0;
sh = parseFloat(sh) || 0;
sr = parseFloat(sr) || 0;

let ventExt = document.getElementById("ventiloExt").value;
let ventInt = document.getElementById("ventiloInt").value;

let txt="";
let cert=0;

// DIAGNOSTIC PROPRE

if(sh>15 && sr<5){
  txt+="🔥 FALTA DE REFRIGERANTE IMPORTANTE\n";
  cert+=4;
}

if(sh>10){
  txt+="👉 Sobrecalentamiento alto\n";
  cert+=2;
}

if(sr<5){
  txt+="👉 Subenfriamiento bajo\n";
  cert+=2;
}

if(bp<3 && hp<10 && bp!==0 && hp!==0){
  txt+="\n🔴 Falta de refrigerante confirmada\n";
  cert+=3;
}

if(bp>6 && hp<12){
  txt+="\n⚠️ Compresor fatigado\n";
  cert+=3;
}

if(hp>20){
  txt+="\n🔥 Problema de condensación\n";
  cert+=2;
}

if(ventExt=="hs"){
  txt+="\n⚡ Ventilador exterior defectuoso\n";
  cert+=2;
}

if(ventInt=="hs"){
  txt+="\n❄️ Ventilador interior defectuoso\n";
  cert+=2;
}

if(dt<5 && dt!==0){
  txt+="\n❌ Bajo rendimiento\n";
}

// fallback intelligent
if(txt===""){
  txt="ℹ️ Datos insuficientes para diagnóstico fiable";
}

// certitude
txt+="\n\n🎯 NIVEL DE CONFIANZA: ";
if(cert>=6) txt+="ALTO";
else if(cert>=3) txt+="MEDIO";
else txt+="BAJO";

document.getElementById("result").innerText=txt;
}


// SAVE
function save(){
let nombre = document.getElementById("cliente").value;
let res = document.getElementById("result").innerText;

if(!nombre){
  alert("Cliente requerido");
  return;
}

let data = JSON.parse(localStorage.getItem("clientes")||"[]");

data.push({
  nom:nombre,
  date:new Date().toLocaleString(),
  res:res
});

localStorage.setItem("clientes",JSON.stringify(data));

alert("Guardado ✔");
}


// HISTORIQUE
function showHistory(){
let data = JSON.parse(localStorage.getItem("clientes")||"[]");

if(data.length===0){
  alert("No hay clientes");
  return;
}

let txt="📂 HISTORIAL\n\n";

data.forEach((c,index)=>{
  txt+=index+" - "+c.nom+" ("+c.date+")\n";
  txt+=c.res+"\n\n";
});

alert(txt);
}


// DELETE
function deleteClient(){
let data = JSON.parse(localStorage.getItem("clientes")||"[]");

if(data.length===0){
  alert("No hay clientes");
  return;
}

let index = prompt("Número del cliente a borrar:");

if(index===null) return;

index = parseInt(index);

if(isNaN(index) || index<0 || index>=data.length){
  alert("Número inválido");
  return;
}

data.splice(index,1);

localStorage.setItem("clientes",JSON.stringify(data));

alert("Cliente eliminado ✔");
}

</script>

</body>
</html>
